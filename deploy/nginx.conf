# Production Nginx site config for killerwhaleslabs.
#
# NOTE: Place the following line in the 'http' block of your main /etc/nginx/nginx.conf:
# limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
# gzip on;
# gzip_types text/plain application/json application/javascript text/css;

server {
  listen 80;
  server_name yourdomain.com www.yourdomain.com;

  # Redirect all plaintext traffic to HTTPS.
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name yourdomain.com www.yourdomain.com;

  # Replace these placeholder certificate paths with the real Let's Encrypt paths.
  ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

  # Logo uploads are capped at 420 KB in the API; keep a small margin for JSON/base64 overhead.
  client_max_body_size 1m;

  # Browser HTTPS pinning for the domain and subdomains.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  root /var/www/killerwhaleslabs/dist;
  index index.html;

  # Long-lived immutable cache for Vite-built static assets and image/font files.
  location ~* \.(js|css|woff2|png|jpg|webp|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SSE stream needs buffering disabled and a long read timeout.
  location /api/market/stream {
    proxy_pass http://127.0.0.1:4000/api/market/stream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    chunked_transfer_encoding on;
  }

  # Public and admin API traffic is proxied to the local Express server.
  location /api/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://127.0.0.1:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Local logo storage fallback. R2-hosted logos bypass this path.
  location /uploads/ {
    proxy_pass http://127.0.0.1:4000/uploads/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Vite SPA fallback for client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
