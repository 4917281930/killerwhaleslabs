<!doctype html>
<html lang="en" style="background:#060708">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="killerwhaleslabs tracks Bitcoin market signal and curated crypto airdrop opportunities."
    />
    <title>killerwhaleslabs</title>
    <style>
      html, body, #root { min-height: 100%; background: #060708; }
      body { margin: 0; }
      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #060708;
      }
      .boot-spinner {
        position: relative;
        display: grid;
        width: 64px;
        height: 64px;
        place-items: center;
      }
      .boot-spinner::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: conic-gradient(from 0deg, #f7931a, rgba(247,147,26,.38), transparent 72%);
        animation: boot-spin .8s linear infinite;
      }
      .boot-spinner::after {
        content: "";
        position: absolute;
        inset: 3px;
        border-radius: 999px;
        background: #060708;
      }
      .boot-bitcoin {
        position: relative;
        z-index: 1;
        width: 44px;
        height: 44px;
        filter: drop-shadow(0 0 14px rgba(247,147,26,.34));
      }
      @media (min-width: 640px) {
        .boot-spinner { width: 80px; height: 80px; }
        .boot-bitcoin { width: 54px; height: 54px; }
      }
      @media (min-width: 1024px) {
        .boot-spinner { width: 96px; height: 96px; }
        .boot-bitcoin { width: 65px; height: 65px; }
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body style="background:#060708">
    <div id="boot-loader" aria-hidden="true">
      <div class="boot-spinner">
        <svg class="boot-bitcoin" viewBox="0 0 64 64">

        </svg>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
